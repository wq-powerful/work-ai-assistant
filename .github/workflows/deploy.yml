name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - id: check
        run: |
          if [ -n "${{ vars.GITHUB_PAGES_API_BASE_URL }}" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages deploy enabled."
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping GitHub Pages deploy because repository variable GITHUB_PAGES_API_BASE_URL is not configured."
          fi

  build:
    needs: preflight
    if: needs.preflight.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: |
          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "Repository variable GITHUB_PAGES_API_BASE_URL is required for GitHub Pages deploy."
            exit 1
          fi
          npm run build
        env:
          VITE_BASE_PATH: /work-ai-assistant/
          VITE_API_BASE_URL: ${{ vars.GITHUB_PAGES_API_BASE_URL }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    if: needs.preflight.outputs.should_deploy == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs:
      - preflight
      - build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  skip:
    needs: preflight
    if: needs.preflight.outputs.should_deploy != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Explain skipped deploy
        run: echo "GitHub Pages deploy skipped because GITHUB_PAGES_API_BASE_URL is not configured."
